<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPIHW_SYSTEM_v1.2.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="document.getElementById('command-input').focus()">

    <div id="terminal">
        <div id="output"></div>
        <div id="input-line" style="display: none;">
            <span class="prompt">$ :</span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
