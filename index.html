<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPIHW</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <audio id="musicaFondo" loop>
        <source src="haykus3m.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <img src="logo.png" alt="REPIHW" class="logo-img">
        <h2>Introduce el código:</h2>
        <input type="text" id="codigo" placeholder="Introduce el código" readonly>
        <div class="teclado" id="teclado"></div>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        const mensajeDiv = document.getElementById('mensaje');
        const input = document.getElementById('codigo');
        const teclado = document.getElementById('teclado');
        const musica = document.getElementById('musicaFondo');
        let musicaIniciada = false;

        const keys = ['1','2','3','4','5','6','7','8','9','backspace','0','enter'];

        keys.forEach(key => {
            const btn = document.createElement('button');

            btn.onclick = () => {
                // Inicia la música al primer toque
                if (!musicaIniciada) {
                    musica.play().catch(e => console.log("Error de reproducción"));
                    musicaIniciada = true;
                }

                if(key === 'backspace') {
                    input.value = input.value.slice(0, -1);
                } else if(key === 'enter') {
                    verificarCodigo();
                } else {
                    input.value += key;
                }
            };

            // Configuración visual de las teclas
            if(key === 'backspace') {
                btn.textContent = '←';
                btn.className = 'key special backspace';
            } else if(key === 'enter') {
                btn.textContent = '✔';
                btn.className = 'key special enter';
            } else {
                btn.textContent = key;
                btn.className = 'key';
            }

            teclado.appendChild(btn);
        });

        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'mensaje ' + tipo;
            setTimeout(() => {
                mensajeDiv.textContent = '';
                mensajeDiv.className = 'mensaje';
            }, 3000);
        }

        function verificarCodigo() {
            const valor = input.value.trim();
            
            if (valor === '39610534') {
                // Abre el video de YouTube
                window.location.href = 'https://m.youtube.com/watch?v=QDia3e12czc';
            } 
            else if (valor === '1111') {
                // Abre tu archivo de contacto
                window.location.href = 'infocontact.txt';
            } 
            else {
                mostrarMensaje('Código incorrecto', 'error');
            }
        }
    </script>
</body>
</html>
