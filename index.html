<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPIHW</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="REPIHW" class="logo-img">
        <h2>Introduce el código:</h2>
        <input type="text" id="codigo" placeholder="" readonly>
        <div class="teclado" id="teclado"></div>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        // ... (Tu JavaScript se mantiene igual, funciona perfectamente)
        const mensajeDiv = document.getElementById('mensaje');
        const input = document.getElementById('codigo');
        const teclado = document.getElementById('teclado');
        const keys = ['1','2','3','4','5','6','7','8','9','backspace','0','enter'];

        keys.forEach(key => {
            const btn = document.createElement('button');
            if(key === 'backspace') {
                btn.textContent = '←';
                btn.className = 'key special backspace';
                btn.onclick = () => input.value = input.value.slice(0, -1);
            } else if(key === 'enter') {
                btn.textContent = '✔';
                btn.className = 'key special enter';
                btn.onclick = () => verificarCodigo();
            } else {
                btn.textContent = key;
                btn.className = 'key';
                btn.onclick = () => input.value += key;
            }
            teclado.appendChild(btn);
        });

        function verificarCodigo() {
            const valor = input.value.trim();
            if (valor === '39610534') {
                window.location.href = 'https://m.youtube.com/watch?v=QDia3e12czc';
            } else {
                mostrarMensaje('Código incorrecto', 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'mensaje ' + tipo;
            setTimeout(() => {
                mensajeDiv.textContent = '';
                mensajeDiv.className = 'mensaje';
            }, 3000);
        }
    </script>
</body>
</html>
