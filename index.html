<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redirección por código</title>
</head>
<body>
    <h2>Introduce el código para continuar:</h2>
    <input type="text" id="codigo" placeholder="Introduce el código">
    <button onclick="verificarCodigo()">Enviar</button>

    <script>
        function verificarCodigo() {
            const input = document.getElementById('codigo').value.trim();
            if (input === '0XPG09J') {
                window.location.href = 'https://m.youtube.com/watch?v=QDia3e12czc&pp=ygUPUmlja3JvbGwgbm8gYWRz';
            } else {
                alert('Código incorrecto');
            }
        }
    </script>
</body>
</html>
